#services:

  backend:
    build: ./backend
    container_name: ${BACKEND_CONTAINER}
    expose:
      - "${BACKEND_PORT}"
    networks:
      - internal_net

  nginx:
    image: nginx:1.27-alpine
    container_name: ${NGINX_CONTAINER}
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - internal_net

networks:
  internal_net:
    driver: bridge
